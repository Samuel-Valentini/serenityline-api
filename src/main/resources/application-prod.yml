spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

serenityline:
  security:
    cors:
      allowed-origins:
        - https://serenityline.me
        - https://www.serenityline.me
    token-hashing:
      secret: ${TOKEN_HASHING_SECRET}
    email-outbox:
      encryption-key-id: ${EMAIL_OUTBOX_ENCRYPTION_KEY_ID}
      encryption-key-base64: ${EMAIL_OUTBOX_ENCRYPTION_KEY_BASE64}
  auth:
    restore-account:
      token-ttl: ${RESTORE_ACCOUNT_TOKEN_TTL:10m}