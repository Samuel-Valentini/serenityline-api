finance.default-category.rent.name=Affitti
finance.default-category.rent.description=Canoni di locazione pagati o incassati per immobili, stanze, terreni o altri beni concessi in uso. Usa questa categoria quando il movimento riguarda direttamente un affitto, non un mutuo o una spesa generica per la casa.
finance.default-category.food-and-household.name=Alimentari e altre spese domestiche
finance.default-category.food-and-household.description=Spese ordinarie per la vita quotidiana in casa: alimentari, prodotti per la pulizia, articoli domestici di consumo e piccole necessità ricorrenti del nucleo familiare.
finance.default-category.other-income.name=Altre entrate
finance.default-category.other-income.description=Entrate che non derivano chiaramente da lavoro, investimenti, affitti o altre categorie specifiche. Utile per incassi occasionali, regali ricevuti, vendite saltuarie o entrate non ricorrenti difficili da classificare.
finance.default-category.insurance.name=Assicurazioni
finance.default-category.insurance.description=Premi assicurativi e coperture di protezione personale, familiare, patrimoniale o professionale. Include polizze vita, casa, responsabilità civile, tutela legale e altre coperture non classificate in modo più specifico, escluse le assicurazioni relative ai veicoli.
finance.default-category.vehicle.name=Auto
finance.default-category.vehicle.description=Spese e movimenti legati al possesso, utilizzo e mantenimento dell’auto o di altri veicoli a uso personale: carburante, manutenzione, riparazioni, revisione, bollo, parcheggi, pedaggi, assicurazioni specifiche e acquisto o vendita del veicolo.
finance.default-category.charity.name=Beneficenza
finance.default-category.charity.description=Donazioni, offerte e sostegno economico a persone, enti, associazioni o cause sociali, religiose, culturali o umanitarie.
finance.default-category.essential-recurring-services.name=Bollette e altri servizi ricorrenti di prima necessità
finance.default-category.essential-recurring-services.description=Utenze e servizi ricorrenti necessari alla gestione della casa o della vita quotidiana: luce, gas, acqua, internet, telefono, costi bancari ricorrenti, rifiuti e altri servizi periodici simili.
finance.default-category.home.name=Casa
finance.default-category.home.description=Spese legate alla gestione, manutenzione, arredamento o miglioramento dell’abitazione. Non usare per mutuo, affitto, bollette o quando esistono categorie dedicate. Le piccole spese domestiche dovrebbero essere registrate in “Alimentari e altre spese domestiche”.
finance.default-category.family.name=Famiglia
finance.default-category.family.description=Spese e movimenti economici legati ai bisogni del nucleo familiare o al supporto di familiari: figli, partner, genitori, parenti, cura familiare e contributi interni alla famiglia.
finance.default-category.small-expense-funds.name=Fondi per piccole spese
finance.default-category.small-expense-funds.description=Somme che l’utente si auto-assegna per tenere sotto controllo piccole spese, quando non è ancora utile o possibile assegnarle a una categoria più specifica.
finance.default-category.education.name=Formazione e istruzione
finance.default-category.education.description=Spese per studio, corsi, libri, università, formazione professionale, aggiornamento personale, certificazioni e percorsi educativi propri o dei familiari.
finance.default-category.investments.name=Investimenti
finance.default-category.investments.description=Movimenti legati alla costruzione, gestione o dismissione di investimenti finanziari o patrimoniali. Include conferimenti, acquisti, vendite, rendimenti, dividendi e altri flussi collegati al capitale investito.
finance.default-category.work.name=Lavoro
finance.default-category.work.description=Entrate e spese direttamente collegate all’attività lavorativa o professionale. Include stipendio, compensi, consulenze, strumenti di lavoro, trasferte lavorative e costi necessari per produrre reddito.
finance.default-category.loans-and-mortgages.name=Mutui e prestiti
finance.default-category.loans-and-mortgages.description=Rate, interessi, estinzioni parziali o totali e altri movimenti direttamente collegati a un mutuo o a un prestito. Da usare separatamente rispetto ad affitto, casa o investimenti, perché mutui e prestiti hanno un impatto strutturale sulla pianificazione.
finance.default-category.supplementary-pension.name=Pensione integrativa
finance.default-category.supplementary-pension.description=Versamenti, riscatti, rendite o movimenti collegati a fondi pensione, previdenza complementare e strumenti pensati per integrare il reddito futuro da pensione.
finance.default-category.personal-care.name=Piccole spese personali
finance.default-category.personal-care.description=Spese relative alla cura personale. Le altre piccole spese che non hanno una categoria più specifica dovrebbero essere registrate in “Fondi per piccole spese”.
finance.default-category.health.name=Salute
finance.default-category.health.description=Spese e movimenti collegati alla cura della salute fisica o mentale: visite mediche, farmaci, terapie, esami, prevenzione, dentista, psicoterapia e assistenza sanitaria.
finance.default-category.direct-taxes.name=Tasse e prelievi diretti
finance.default-category.direct-taxes.description=Tassazioni, imposte o contributi per cui l’utente effettua un versamento diretto, come tasse sul reddito pagate dopo la dichiarazione, imposte sulla proprietà o altri versamenti fiscali effettuati manualmente.
finance.default-category.indirect-taxes.name=Tasse e prelievi indiretti
finance.default-category.indirect-taxes.description=Tassazioni, imposte o contributi trattenuti o prelevati dalla disponibilità dell’utente senza un versamento manuale, come trattenute sullo stipendio, tassazioni alla fonte o prelievi fiscali automatici.
finance.default-category.holidays.name=Vacanze
finance.default-category.holidays.description=Spese e movimenti collegati a viaggi di piacere, soggiorni, ferie e periodi di riposo personale o familiare. Da non usare per trasferte di lavoro o spostamenti dovuti a salute, studio o altri bisogni specifici.
finance.default-category.adjustments.name=Rettifiche
finance.default-category.adjustments.description=Importi necessari per allineare la situazione reale con quella registrata in SerenityLine, generalmente dovuti a piccole maggiori o minori spese o entrate una tantum che non si reputano meritevoli di ricondurre a una categoria specifica.
