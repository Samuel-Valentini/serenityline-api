spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug

serenityline:
  security:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://localhost:5174
    token-hashing:
      secret: ${TOKEN_HASHING_SECRET}
    email-outbox:
      encryption-key-id: ${EMAIL_OUTBOX_ENCRYPTION_KEY_ID}
      encryption-key-base64: ${EMAIL_OUTBOX_ENCRYPTION_KEY_BASE64}
  auth:
    restore-account:
      token-ttl: ${RESTORE_ACCOUNT_TOKEN_TTL:10m}
    email-verification-resend:
      token-ttl: ${EMAIL_VERIFICATION_RESEND_TOKEN_TTL:15m}
      cooldown: ${EMAIL_VERIFICATION_RESEND_COOLDOWN:60s}
    jwt:
      issuer: ${JWT_ISSUER:serenityline-api}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      secret: ${JWT_SECRET}