spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug

serenityline:
  security:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://localhost:5174
    token-hashing:
      secret: ${TOKEN_HASHING_SECRET}