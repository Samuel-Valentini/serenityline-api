finance.default-category.rent.name=Rent
finance.default-category.rent.description=Rent paid or received for properties, rooms, land or other assets granted for use. Use this category when the movement directly concerns rent, not a mortgage or a generic home expense.
finance.default-category.food-and-household.name=Food and household expenses
finance.default-category.food-and-household.description=Ordinary expenses for daily life at home: food, cleaning products, household consumables and small recurring needs of the household.
finance.default-category.other-income.name=Other income
finance.default-category.other-income.description=Income that does not clearly come from work, investments, rent or other specific categories. Useful for occasional receipts, gifts received, occasional sales or non-recurring income that is hard to classify.
finance.default-category.insurance.name=Insurance
finance.default-category.insurance.description=Insurance premiums and personal, family, asset or professional protection coverages. Includes life, home, liability, legal protection and other coverages not classified more specifically, excluding vehicle-related insurance.
finance.default-category.vehicle.name=Vehicles
finance.default-category.vehicle.description=Expenses and movements related to owning, using and maintaining a car or other personal-use vehicles: fuel, maintenance, repairs, inspections, vehicle taxes, parking, tolls, specific insurance and purchase or sale of the vehicle.
finance.default-category.charity.name=Charity
finance.default-category.charity.description=Donations, offerings and financial support to people, organizations, associations or social, religious, cultural or humanitarian causes.
finance.default-category.essential-recurring-services.name=Bills and other essential recurring services
finance.default-category.essential-recurring-services.description=Utilities and recurring services needed for home management or daily life: electricity, gas, water, internet, phone, recurring banking fees, waste charges and other similar periodic services.
finance.default-category.home.name=Home
finance.default-category.home.description=Expenses related to managing, maintaining, furnishing or improving the home. Do not use for mortgage, rent, bills or when dedicated categories exist. Small household expenses should be recorded under “Food and household expenses”.
finance.default-category.family.name=Family
finance.default-category.family.description=Expenses and financial movements related to household needs or support for family members: children, partner, parents, relatives, family care and internal family contributions.
finance.default-category.small-expense-funds.name=Small expense funds
finance.default-category.small-expense-funds.description=Amounts the user self-assigns to keep small expenses under control when it is not yet useful or possible to assign them to a more specific category.
finance.default-category.education.name=Education and training
finance.default-category.education.description=Expenses for study, courses, books, university, professional training, personal development, certifications and educational paths for the user or family members.
finance.default-category.investments.name=Investments
finance.default-category.investments.description=Movements related to building, managing or disposing of financial or asset investments. Includes contributions, purchases, sales, returns, dividends and other flows connected to invested capital.
finance.default-category.work.name=Work
finance.default-category.work.description=Income and expenses directly connected to work or professional activity. Includes salary, fees, consulting income, work tools, business travel and costs needed to generate income.
finance.default-category.loans-and-mortgages.name=Loans and mortgages
finance.default-category.loans-and-mortgages.description=Installments, interest, partial or full repayments and other movements directly connected to a mortgage or loan. Keep separate from rent, home or investments because loans and mortgages have a structural impact on planning.
finance.default-category.supplementary-pension.name=Supplementary pension
finance.default-category.supplementary-pension.description=Contributions, redemptions, annuities or movements connected to pension funds, supplementary pension schemes and tools designed to supplement future retirement income.
finance.default-category.personal-care.name=Personal care
finance.default-category.personal-care.description=Expenses related to personal care. Other small expenses that do not have a more specific category should be recorded under “Small expense funds”.
finance.default-category.health.name=Health
finance.default-category.health.description=Expenses and movements connected to physical or mental health care: medical visits, medicines, therapies, tests, prevention, dentist, psychotherapy and healthcare assistance.
finance.default-category.direct-taxes.name=Direct taxes and levies
finance.default-category.direct-taxes.description=Taxes, duties or contributions for which the user makes a direct payment, such as income taxes paid after filing a tax return, property taxes or other manually paid tax obligations.
finance.default-category.indirect-taxes.name=Indirect taxes and levies
finance.default-category.indirect-taxes.description=Taxes, duties or contributions withheld or taken from the user’s available funds without a manual payment, such as payroll withholding, withholding taxes or automatic tax deductions.
finance.default-category.holidays.name=Holidays
finance.default-category.holidays.description=Expenses and movements connected to leisure trips, stays, holidays and periods of personal or family rest. Do not use for business travel or travel due to health, study or other specific needs.
finance.default-category.adjustments.name=Adjustments
finance.default-category.adjustments.description=Amounts needed to align the real financial situation with the one recorded in SerenityLine, usually due to small extra or missing expenses, or one-off income, that the user does not consider worth assigning to a specific category.
