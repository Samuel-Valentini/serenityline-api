spring:
  application:
    name: serenityline-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: ${SERVER_PORT:3001}

serenityline:
  auth:
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    session-ttl: 30d
