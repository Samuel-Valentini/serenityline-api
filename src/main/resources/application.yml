spring:
  application:
    name: serenityline-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: ${SERVER_PORT:3001}

serenityline:
  auth:
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    session-ttl: 30d
    email-verification:
      token-ttl: 24h
  security:
    cors:
      allowed-origins: [ ]
      token-hashing:
        secret: ${TOKEN_HASHING_SECRET}
    sensitive-hash:
      key-base64: ${SENSITIVE_HASH_KEY_BASE64}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  finance:
    max-simulation-group-ids: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    probes:
      enabled: true


