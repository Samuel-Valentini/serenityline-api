spring:
  application:
    name: serenityline-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: ${SERVER_PORT:3001}

serenityline:
  auth:
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    session-ttl: 30d
    email-verification:
      token-ttl: 24h
    user-invitation:
      token-ttl: 7d
  security:
    cors:
      allowed-origins: [ ]
      token-hashing:
        secret: ${TOKEN_HASHING_SECRET}
    sensitive-hash:
      key-base64: ${SENSITIVE_HASH_KEY_BASE64}
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  finance:
    max-simulation-group-ids: 50
    calendar:
      max-range-days: 1830
      max-recurring-transactions: 500
      max-account-ids: 50
    reports:
      extremes-past-months: 36
      extremes-future-months: 36
      year-end-forecast-years: 10
      trend-min-days: 90
  export:
    jdbc-fetch-size: ${DATA_EXPORT_JDBC_FETCH_SIZE:500}
    max-rows-per-csv-file: ${DATA_EXPORT_MAX_ROWS_PER_CSV_FILE:50000}
    max-concurrent-exports: ${DATA_EXPORT_MAX_CONCURRENT_EXPORTS:2}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    probes:
      enabled: true


