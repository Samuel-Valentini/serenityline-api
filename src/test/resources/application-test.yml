spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/serenityline_test}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

serenityline:
  security:
    cors:
      allowed-origins:
        - http://localhost:5173
    token-hashing:
      secret: ${TOKEN_HASHING_SECRET}
    email-outbox:
      encryption-key-id: ${EMAIL_OUTBOX_ENCRYPTION_KEY_ID}
      encryption-key-base64: ${EMAIL_OUTBOX_ENCRYPTION_KEY_BASE64}

logging:
  level:
    org.hibernate.SQL: warn