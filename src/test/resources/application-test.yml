spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/serenityline_test}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      connection-timeout: 5000
      idle-timeout: 10000
      max-lifetime: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

serenityline:
  security:
    cors:
      allowed-origins:
        - http://localhost:5173
    token-hashing:
      secret: ${TOKEN_HASHING_SECRET}
    email-outbox:
      encryption-key-id: ${EMAIL_OUTBOX_ENCRYPTION_KEY_ID}
      encryption-key-base64: ${EMAIL_OUTBOX_ENCRYPTION_KEY_BASE64}
  auth:
    restore-account:
      token-ttl: ${RESTORE_ACCOUNT_TOKEN_TTL:10m}
    email-verification-resend:
      token-ttl: ${EMAIL_VERIFICATION_RESEND_TOKEN_TTL:15m}
      cooldown: ${EMAIL_VERIFICATION_RESEND_COOLDOWN:60s}
    email-change:
      token-ttl: ${AUTH_EMAIL_CHANGE_TOKEN_TTL:30m}
    jwt:
      issuer: ${JWT_ISSUER:serenityline-api}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      secret: ${JWT_SECRET}
    refresh-token:
      ttl: ${REFRESH_TOKEN_TTL:30d}
      cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:serenityline_refresh}
      cookie-secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}
      cookie-same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
    password-reset:
      token-ttl: ${PASSWORD_RESET_TOKEN_TTL:30m}
      cooldown: ${PASSWORD_RESET_COOLDOWN:60s}
    login-attempt:
      window: ${LOGIN_ATTEMPT_WINDOW:15m}
      max-failed-by-email-ip: ${LOGIN_ATTEMPT_MAX_FAILED_BY_EMAIL_IP:5}
      max-failed-by-email: ${LOGIN_ATTEMPT_MAX_FAILED_BY_EMAIL:10}
      max-failed-by-ip: ${LOGIN_ATTEMPT_MAX_FAILED_BY_IP:50}
    login-2fa:
      code-ttl: ${LOGIN_2FA_CODE_TTL:10m}
      max-attempts: ${LOGIN_2FA_MAX_ATTEMPTS:5}
    action-token-cleanup:
      enabled: ${AUTH_ACTION_TOKEN_CLEANUP_ENABLED:false}
      fixed-delay-ms: ${AUTH_ACTION_TOKEN_CLEANUP_FIXED_DELAY_MS:3600000}
      retention: ${AUTH_ACTION_TOKEN_CLEANUP_RETENTION:30d}
      batch-size: ${AUTH_ACTION_TOKEN_CLEANUP_BATCH_SIZE:500}
    session-cleanup:
      enabled: ${AUTH_SESSION_CLEANUP_ENABLED:false}
      fixed-delay-ms: ${AUTH_SESSION_CLEANUP_FIXED_DELAY_MS:3600000}
      retention: ${AUTH_SESSION_CLEANUP_RETENTION:90d}
      batch-size: ${AUTH_SESSION_CLEANUP_BATCH_SIZE:500}
  finance:
    reminder-worker:
      enabled: ${FINANCE_REMINDER_WORKER_ENABLED:false}
      fixed-delay-ms: ${FINANCE_REMINDER_WORKER_FIXED_DELAY_MS:3600000}
      slow-run-warning-ms: ${FINANCE_REMINDER_WORKER_SLOW_RUN_WARNING_MS:30000}
      high-candidates-warning-threshold: ${FINANCE_REMINDER_WORKER_HIGH_CANDIDATES_WARNING_THRESHOLD:1000}
    reminder-final-status-worker:
      enabled: ${FINANCE_REMINDER_FINAL_STATUS_WORKER_ENABLED:false}
      fixed-delay-ms: ${FINANCE_REMINDER_FINAL_STATUS_WORKER_FIXED_DELAY_MS:600000}
      batch-size: ${FINANCE_REMINDER_FINAL_STATUS_WORKER_BATCH_SIZE:100}


  email:
    outbox-worker:
      enabled: ${EMAIL_OUTBOX_WORKER_ENABLED:false}
      batch-size: ${EMAIL_OUTBOX_WORKER_BATCH_SIZE:20}
      fixed-delay-ms: ${EMAIL_OUTBOX_WORKER_FIXED_DELAY_MS:5000}
      retry-delay: ${EMAIL_OUTBOX_WORKER_RETRY_DELAY:2m}
    provider: ${EMAIL_PROVIDER}
    from: ${EMAIL_FROM}
    resend:
      api-key: ${RESEND_API_KEY}


logging:
  level:
    org.hibernate.SQL: warn